<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenResty IP 黑名单</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f6f7f9; }
    .shell { max-width: 1080px; }
    .table td, .table th { vertical-align: middle; }
    .token-input { max-width: 420px; }
  </style>
</head>
<body>
  <main class="container shell py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
      <div>
        <h1 class="h3 mb-1">IP 黑名单管理</h1>
        <div class="text-secondary">OpenResty + Lua + Redis 动态封禁</div>
      </div>
      <button id="refreshBtn" class="btn btn-outline-primary">刷新列表</button>
    </div>

    <section class="card mb-4">
      <div class="card-body">
        <label for="token" class="form-label">管理 Token</label>
        <input id="token" class="form-control token-input" type="password" value="change-me" autocomplete="off">
        <div class="form-text">对应 Docker 环境变量 ADMIN_TOKEN。</div>
      </div>
    </section>

    <section class="card mb-4">
      <div class="card-header bg-white fw-semibold">添加拉黑 IP</div>
      <div class="card-body">
        <form id="banForm" class="row g-3">
          <div class="col-md-4">
            <label for="ip" class="form-label">IP</label>
            <input id="ip" class="form-control" placeholder="1.2.3.4" required>
          </div>
          <div class="col-md-3">
            <label for="ttl" class="form-label">封禁秒数</label>
            <input id="ttl" class="form-control" type="number" min="1" value="3600" required>
          </div>
          <div class="col-md-3">
            <label for="reason" class="form-label">原因</label>
            <input id="reason" class="form-control" value="manual">
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-danger w-100" type="submit">拉黑</button>
          </div>
        </form>
      </div>
    </section>

    <div id="alert" class="alert d-none" role="alert"></div>

    <section class="card">
      <div class="card-header bg-white fw-semibold">当前黑名单</div>
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>IP</th>
              <th>剩余秒数</th>
              <th>原因</th>
              <th class="text-end">操作</th>
            </tr>
          </thead>
          <tbody id="banRows">
            <tr><td colspan="4" class="text-secondary text-center py-4">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const tokenEl = document.querySelector('#token');
    const rowsEl = document.querySelector('#banRows');
    const alertEl = document.querySelector('#alert');

    function showAlert(message, type = 'success') {
      alertEl.className = `alert alert-${type}`;
      alertEl.textContent = message;
      setTimeout(() => alertEl.classList.add('d-none'), 3000);
    }

    async function api(path) {
      const response = await fetch(path, {
        headers: { 'X-Admin-Token': tokenEl.value }
      });
      const data = await response.json();
      if (!response.ok || data.ok === false) {
        throw new Error(data.reason || `HTTP ${response.status}`);
      }
      return data;
    }

    function renderRows(bans) {
      if (!bans.length) {
        rowsEl.innerHTML = '<tr><td colspan="4" class="text-secondary text-center py-4">暂无拉黑 IP</td></tr>';
        return;
      }

      rowsEl.innerHTML = bans.map(item => `
        <tr>
          <td><code>${item.ip}</code></td>
          <td>${item.ttl}</td>
          <td>${item.reason || ''}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-secondary" data-unban="${item.ip}">解除</button>
          </td>
        </tr>
      `).join('');
    }

    async function loadBans() {
      rowsEl.innerHTML = '<tr><td colspan="4" class="text-secondary text-center py-4">加载中...</td></tr>';
      try {
        const data = await api('/admin/list');
        renderRows(data.bans || []);
      } catch (error) {
        rowsEl.innerHTML = '<tr><td colspan="4" class="text-danger text-center py-4">加载失败</td></tr>';
        showAlert(error.message, 'danger');
      }
    }

    document.querySelector('#banForm').addEventListener('submit', async event => {
      event.preventDefault();
      const ip = document.querySelector('#ip').value.trim();
      const ttl = document.querySelector('#ttl').value.trim();
      const reason = document.querySelector('#reason').value.trim();
      try {
        await api(`/admin/ban?ip=${encodeURIComponent(ip)}&ttl=${encodeURIComponent(ttl)}&reason=${encodeURIComponent(reason)}`);
        showAlert(`已拉黑 ${ip}`);
        await loadBans();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    });

    rowsEl.addEventListener('click', async event => {
      const ip = event.target.dataset.unban;
      if (!ip) return;
      try {
        await api(`/admin/unban?ip=${encodeURIComponent(ip)}`);
        showAlert(`已解除 ${ip}`);
        await loadBans();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    });

    document.querySelector('#refreshBtn').addEventListener('click', loadBans);
    loadBans();
  </script>
</body>
</html>
