services:
  openresty:
    build: .
    ports:
      - "80:80"
      - "8081:8081" # Admin 管理端口，仅允许内网管理网段访问
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # REDIS_PASSWORD: "your-password"
      ADMIN_TOKEN: "change-me"
      CLIENT_IP_MODE: "remote_addr" # 客户端 IP 获取模式：x_real_ip、proxy_protocol、remote_addr
      FAIL_MODE: "open" # Redis 故障策略：open 放行、closed 返回 503
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    # command: ["redis-server", "--appendonly", "yes", "--requirepass", "your-password"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
