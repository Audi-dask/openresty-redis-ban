server {
    listen 80;
    server_name _;

    location = /health {
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /admin {
        return 302 /admin/;
    }

    location = /admin/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        root /usr/local/openresty/nginx/html;
        try_files /index.html =404;
    }

    location = /admin/ban {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        content_by_lua_file /usr/local/openresty/lua/admin_ban.lua;
    }

    location = /admin/unban {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        content_by_lua_file /usr/local/openresty/lua/admin_unban.lua;
    }

    location = /admin/check {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        content_by_lua_file /usr/local/openresty/lua/admin_check.lua;
    }

    location = /admin/list {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        content_by_lua_file /usr/local/openresty/lua/admin_list.lua;
    }

    location / {
        # Demo 入口：生产环境建议删除，并在真实业务 location 中加入 access_by_lua_file。
        access_by_lua_file /usr/local/openresty/lua/access.lua;

        default_type application/json;
        content_by_lua_block {
            ngx.say('{"ok":true,"message":"request allowed"}')
        }
    }
}
