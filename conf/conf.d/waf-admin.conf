server {
    # 管理面独立端口；宿主机防火墙或安全组应只允许管理网访问。
    listen 8081;
    server_name _;

    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    location = /health {
        default_type text/plain;
        return 200 "ok\n";
    }

    location = / {
        root /usr/local/openresty/nginx/html;
        try_files /index.html =404;
    }

    # 兼容旧地址，统一跳转到管理端根路径。
    location = /admin {
        return 302 /;
    }

    location = /admin/ {
        return 302 /;
    }

    location = /admin/ban {
        content_by_lua_file /usr/local/openresty/lua/admin_ban.lua;
    }

    location = /admin/unban {
        content_by_lua_file /usr/local/openresty/lua/admin_unban.lua;
    }

    location = /admin/check {
        content_by_lua_file /usr/local/openresty/lua/admin_check.lua;
    }

    location = /admin/list {
        content_by_lua_file /usr/local/openresty/lua/admin_list.lua;
    }

    location = /admin/rules {
        content_by_lua_file /usr/local/openresty/lua/admin_rules.lua;
    }

    location = /admin/rule-limits {
        content_by_lua_file /usr/local/openresty/lua/admin_rule_limits.lua;
    }

    location = /admin/events {
        content_by_lua_file /usr/local/openresty/lua/admin_events.lua;
    }

    location / {
        return 404;
    }
}
